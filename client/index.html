<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questwyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="stage">

<!-- Home page section  -->

  <div class="gradient-layer gradient-layer--one" aria-hidden="true"></div>
  <div class="gradient-layer gradient-layer--two" aria-hidden="true"></div>
  <div class="gradient-layer gradient-layer--ground" aria-hidden="true"></div>

    <nav class="nav-bar">
      <button class="nav-btn" id="theme-toggle" type="button" aria-label="Toggle dark and light mode" title="Dark / light mode">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <line x1="12" y1="2" x2="12" y2="4"></line>
          <line x1="12" y1="20" x2="12" y2="22"></line>
          <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
          <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
          <line x1="2" y1="12" x2="4" y2="12"></line>
          <line x1="20" y1="12" x2="22" y2="12"></line>
          <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
          <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
        </svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <button class="nav-btn" id="sound-toggle" type="button" aria-label="Toggle music and sound" title="Music / sound">
        <svg class="icon icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        <svg class="icon icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>

      <button class="nav-btn" id="import-save" type="button" aria-label="Import or save file" title="Import / save file">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
      <input type="file" id="file-input" hidden>

      <button class="nav-btn" id="return-btn" type="button" aria-label="Return" title="Return">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>

      <button class="nav-btn" id="about-btn" type="button" aria-label="About" title="About">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </button>
    </nav>

    <section class="content-row">
      <figure class="cloud">
        <span class="puff puff--body"></span>
        <span class="puff puff--left"></span>
        <span class="puff puff--mid"></span>
        <span class="puff puff--right"></span>
        <img class="cloud-logo" src="/qt-logo.png" alt="QT logo">
      </figure>

      <aside class="story-menu">
        <h2 class="story-menu__title">Choose a story to tell</h2>
        <button class="story-btn" data-story="comedy" type="button">Comedy</button>
        <button class="story-btn" data-story="horror" type="button">Horror</button>
        <button class="story-btn" data-story="romance" type="button">Romance</button>
        <button class="story-btn" data-story="scifi" type="button">Sci-Fi</button>
        <button class="story-btn" data-story="western" type="button">Western</button>
      </aside>
    </section>

</main>

  <script>
    // Dark / light mode toggle
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('theme-dark');
    });

    // Music / sound toggle (visual state only — wire up an <audio> element to make it functional)
    const soundToggle = document.getElementById('sound-toggle');
    soundToggle.addEventListener('click', () => {
      soundToggle.classList.toggle('is-muted');
    });

    // Import / save file
    const importSaveBtn = document.getElementById('import-save');
    const fileInput = document.getElementById('file-input');
    importSaveBtn.addEventListener('click', () => {
      fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        console.log('File selected:', e.target.files[0].name);
      }
    });

    // About button — placeholder action
    const aboutBtn = document.getElementById('about-btn');
    aboutBtn.addEventListener('click', () => {
      console.log('About clicked');
    });

    // Return button — goes back in history, falls back to reload
    const returnBtn = document.getElementById('return-btn');
    returnBtn.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.reload();
      }
    });

    // Story selection buttons — each genre has its own page (e.g. romance.html).
    // Only Romance is built so far; the rest log a placeholder for now.
    const storyPages = {
      romance: 'romance.html'
    };

    const storyButtons = document.querySelectorAll('.story-btn');
    storyButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.story;
        if (storyPages[key]) {
          window.location.href = storyPages[key];
        } else {
          console.log('No page built yet for:', key);
        }
      });
    });
  </script>

</body>
</html>
