<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="800" height="600" fill="#ffffff" stroke="#000000" stroke-width="2"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="800" height="60" fill="#f0f0f0" stroke="#000000" stroke-width="1.5"/>
  <text x="20" y="38" font-size="20" font-weight="bold">QuestTwyst</text>
  <text x="700" y="38" font-size="14">← Back to Library</text>

  <!-- Story title -->
  <text x="20" y="100" font-size="24" font-weight="bold">The Last Bus</text>
  <text x="20" y="125" font-size="13">Passage 3 of ?</text>

  <!-- Passage text box -->
  <rect x="20" y="150" width="760" height="220" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="40" y="180" font-size="14">The exit is jammed. As you pull the handle, the driver</text>
  <text x="40" y="205" font-size="14">watches you in the mirror and finally speaks: "That door</text>
  <text x="40" y="230" font-size="14">doesn't open until everyone's ready."</text>
  <text x="40" y="270" font-size="12" font-style="italic">[full passage text continues here]</text>

  <!-- Choice buttons -->
  <text x="20" y="410" font-size="16" font-weight="bold">What do you do?</text>

  <rect x="20" y="430" width="360" height="70" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="40" y="460" font-size="13" font-weight="bold">A)</text>
  <text x="65" y="460" font-size="13">Ask what "ready" means</text>

  <rect x="420" y="430" width="360" height="70" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="440" y="460" font-size="13" font-weight="bold">B)</text>
  <text x="465" y="460" font-size="13">Sit back down and wait it out</text>

  <!-- Progress path indicator -->
  <text x="20" y="540" font-size="12">Your path so far: Start → B → (current)</text>

  <!-- Restart link -->
  <text x="680" y="540" font-size="12" text-decoration="underline">Restart Story</text>
</svg>
