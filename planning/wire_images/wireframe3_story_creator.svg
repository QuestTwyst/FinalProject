<svg viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="800" height="640" fill="#ffffff" stroke="#000000" stroke-width="2"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="800" height="60" fill="#f0f0f0" stroke="#000000" stroke-width="1.5"/>
  <text x="20" y="38" font-size="20" font-weight="bold">QuestTwyst</text>
  <text x="680" y="38" font-size="14">My Stories</text>

  <!-- Page title -->
  <text x="20" y="100" font-size="24" font-weight="bold">Create a New Story</text>

  <!-- Story title field -->
  <text x="20" y="135" font-size="13" font-weight="bold">Story Title</text>
  <rect x="20" y="145" width="400" height="35" fill="#ffffff" stroke="#000000"/>
  <text x="30" y="168" font-size="12" fill="#888888">e.g. The Last Bus</text>

  <!-- Genre select -->
  <text x="450" y="135" font-size="13" font-weight="bold">Genre</text>
  <rect x="450" y="145" width="200" height="35" fill="#ffffff" stroke="#000000"/>
  <text x="460" y="168" font-size="12">Select genre ▾</text>

  <!-- Passage editor -->
  <text x="20" y="220" font-size="16" font-weight="bold">Passage 1 (auto-created)</text>
  <rect x="20" y="235" width="760" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="35" y="260" font-size="12" fill="#888888">Write your opening passage here...</text>

  <!-- Choice A/B fields -->
  <text x="20" y="360" font-size="13" font-weight="bold">Choice A label</text>
  <rect x="20" y="370" width="360" height="35" fill="#ffffff" stroke="#000000"/>

  <text x="420" y="360" font-size="13" font-weight="bold">Choice B label</text>
  <rect x="420" y="370" width="360" height="35" fill="#ffffff" stroke="#000000"/>

  <!-- Add passage button -->
  <rect x="20" y="430" width="180" height="35" fill="#ffffff" stroke="#000000"/>
  <text x="40" y="453" font-size="13">+ Add Next Passage</text>

  <!-- Mark ending checkbox -->
  <rect x="220" y="430" width="18" height="18" fill="#ffffff" stroke="#000000"/>
  <text x="248" y="443" font-size="13">Mark this passage as an ending</text>

  <!-- Validation note -->
  <text x="20" y="490" font-size="11" font-style="italic" fill="#888888">* Title and both choices required before saving</text>

  <!-- Save / Publish buttons -->
  <rect x="580" y="560" width="90" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="600" y="585" font-size="13">Save Draft</text>

  <rect x="680" y="560" width="100" height="40" fill="#000000"/>
  <text x="700" y="585" font-size="13" fill="#ffffff">Publish</text>
</svg>
