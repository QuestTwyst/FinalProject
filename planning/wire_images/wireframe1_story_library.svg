<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="800" height="600" fill="#ffffff" stroke="#000000" stroke-width="2"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="800" height="60" fill="#f0f0f0" stroke="#000000" stroke-width="1.5"/>
  <text x="20" y="38" font-size="20" font-weight="bold">QuestTwyst</text>
  <rect x="600" y="15" width="80" height="30" fill="#ffffff" stroke="#000000"/>
  <text x="615" y="35" font-size="14">Login</text>
  <rect x="695" y="15" width="90" height="30" fill="#ffffff" stroke="#000000"/>
  <text x="710" y="35" font-size="14">Sign Up</text>

  <!-- Page title -->
  <text x="20" y="100" font-size="24" font-weight="bold">Story Library</text>

  <!-- Genre filter dropdown -->
  <rect x="600" y="80" width="180" height="35" fill="#ffffff" stroke="#000000"/>
  <text x="615" y="103" font-size="14">Filter: All Genres ▾</text>

  <!-- Story cards grid -->
  <g>
    <rect x="20" y="130" width="230" height="180" fill="#ffffff" stroke="#000000"/>
    <rect x="35" y="145" width="200" height="90" fill="#e5e5e5" stroke="#000000"/>
    <text x="150" y="195" font-size="12" text-anchor="middle">[cover image]</text>
    <text x="35" y="255" font-size="15" font-weight="bold">The Last Bus</text>
    <text x="35" y="275" font-size="12">Mystery</text>
    <rect x="35" y="285" width="90" height="20" fill="#000000"/>
    <text x="50" y="300" font-size="11" fill="#ffffff">Start Reading</text>
  </g>

  <g>
    <rect x="270" y="130" width="230" height="180" fill="#ffffff" stroke="#000000"/>
    <rect x="285" y="145" width="200" height="90" fill="#e5e5e5" stroke="#000000"/>
    <text x="400" y="195" font-size="12" text-anchor="middle">[cover image]</text>
    <text x="285" y="255" font-size="15" font-weight="bold">Signal from Deck 9</text>
    <text x="285" y="275" font-size="12">Sci-Fi</text>
    <rect x="285" y="285" width="90" height="20" fill="#000000"/>
    <text x="300" y="300" font-size="11" fill="#ffffff">Start Reading</text>
  </g>

  <g>
    <rect x="520" y="130" width="230" height="180" fill="#ffffff" stroke="#000000"/>
    <rect x="535" y="145" width="200" height="90" fill="#e5e5e5" stroke="#000000"/>
    <text x="650" y="195" font-size="12" text-anchor="middle">[cover image]</text>
    <text x="535" y="255" font-size="15" font-weight="bold">Job Interview Gone Wrong</text>
    <text x="535" y="275" font-size="12">Comedy</text>
    <rect x="535" y="285" width="90" height="20" fill="#000000"/>
    <text x="550" y="300" font-size="11" fill="#ffffff">Start Reading</text>
  </g>

  <g>
    <rect x="20" y="330" width="230" height="180" fill="#ffffff" stroke="#000000"/>
    <rect x="35" y="345" width="200" height="90" fill="#e5e5e5" stroke="#000000"/>
    <text x="150" y="395" font-size="12" text-anchor="middle">[cover image]</text>
    <text x="35" y="455" font-size="15" font-weight="bold">The Backyard Portal</text>
    <text x="35" y="475" font-size="12">Adventure</text>
    <rect x="35" y="485" width="90" height="20" fill="#000000"/>
    <text x="50" y="500" font-size="11" fill="#ffffff">Start Reading</text>
  </g>

  <!-- Create story button -->
  <rect x="600" y="540" width="180" height="40" fill="#000000"/>
  <text x="640" y="565" font-size="14" fill="#ffffff">+ Create Story</text>
</svg>
